services:
  hoocloak:
    image: hoocloak:dev
    build:
      context: .
    command: ["serve", "--config", "/etc/hoocloak/config.yaml"]
    environment:
      HOOCLOAK_LOGIN_MODE: ${HOOCLOAK_LOGIN_MODE:-select}
    volumes:
      - ./examples/hoocloak.yaml:/etc/hoocloak/config.yaml:ro
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "/hoocloak", "health", "--url", "http://127.0.0.1:8080/ready", "--timeout", "2s"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 2s
    ports:
      - "127.0.0.1:8080:8080"
    networks:
      default:
        aliases:
          - hoocloak.localhost

  api:
    image: hoocloak-api:dev
    build:
      context: examples/aspnet-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_HTTP_PORTS: "5099"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/5099 && printf 'GET /api/public HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && head -n 1 <&3 | grep -q ' 200 '"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 2s
    ports:
      - "127.0.0.1:5099:5099"
    depends_on:
      hoocloak:
        condition: service_healthy

  spa:
    image: hoocloak-spa:dev
    build:
      context: examples/react-spa
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:5173/"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 2s
    ports:
      - "127.0.0.1:3000:5173"
    depends_on:
      hoocloak:
        condition: service_healthy
      api:
        condition: service_healthy
