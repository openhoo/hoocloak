services:
  hoocloak:
    build:
      context: ../..
    command: ["serve", "--config", "/etc/hoocloak/config.yaml"]
    environment:
      HOOCLOAK_LOGIN_MODE: ${HOOCLOAK_LOGIN_MODE:-password}
    volumes:
      - ${E2E_CONFIG_PATH}:/etc/hoocloak/config.yaml:ro
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "/hoocloak", "health", "--url", "http://127.0.0.1:${E2E_PROVIDER_PORT}/ready", "--timeout", "2s"]
      interval: 2s
      timeout: 3s
      retries: 30
      start_period: 2s
    ports:
      - "127.0.0.1:${E2E_PROVIDER_PORT}:${E2E_PROVIDER_PORT}"
    networks:
      default:
        aliases:
          - hoocloak.localhost

  api:
    build:
      context: ../../examples/aspnet-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_HTTP_PORTS: "15099"
      Oidc__Authority: ${E2E_PROVIDER_ORIGIN}/realms/development
      Oidc__Audience: hoocloak-api
      Cors__Origin: ${E2E_SPA_ORIGIN}
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/15099 && printf 'GET /api/public HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && head -n 1 <&3 | grep -q ' 200 '"]
      interval: 2s
      timeout: 3s
      retries: 30
      start_period: 2s
    ports:
      - "127.0.0.1:${E2E_API_PORT}:15099"
    depends_on:
      hoocloak:
        condition: service_healthy

  spa:
    build:
      context: ../../examples/react-spa
      args:
        VITE_OIDC_AUTHORITY: ${E2E_PROVIDER_ORIGIN}/realms/development
        VITE_API_BASE_URL: ${E2E_API_ORIGIN}
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:5173/"]
      interval: 2s
      timeout: 3s
      retries: 30
      start_period: 2s
    ports:
      - "127.0.0.1:${E2E_SPA_PORT}:5173"
    depends_on:
      hoocloak:
        condition: service_healthy
      api:
        condition: service_healthy
