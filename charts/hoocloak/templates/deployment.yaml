{{- include "hoocloak.validateValues" . }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "hoocloak.fullname" . }}
  labels:
    {{- include "hoocloak.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "hoocloak.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- if .Values.existingConfigSecret }}
        checksum/external-config: {{ .Values.existingConfigSecretVersion | quote }}
        {{- else }}
        checksum/config: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "hoocloak.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "hoocloak.serviceAccountName" . }}
      automountServiceAccountToken: false
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- if .Values.theme.image.reference }}
      initContainers:
        - name: install-theme
          image: {{ .Values.theme.image.reference | quote }}
          imagePullPolicy: {{ .Values.theme.image.pullPolicy }}
          command:
            - /bin/cp
          args:
            - -R
            - {{ printf "%s/." .Values.theme.sourcePath | quote }}
            - /work/
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          resources:
            {{- toYaml .Values.theme.resources | nindent 12 }}
          volumeMounts:
            - name: theme
              mountPath: /work
      {{- end }}
      containers:
        - name: hoocloak
          image: {{ include "hoocloak.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - serve
            - --config
            - /etc/hoocloak/config.yaml
          env:
            - name: HOOCLOAK_LOGIN_MODE
              value: {{ .Values.loginMode | quote }}
            {{- if .Values.theme.image.reference }}
            - name: HOOCLOAK_UI_THEME_DIR
              value: {{ .Values.theme.mountPath | quote }}
            {{- end }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: 8080
          {{- if .Values.startupProbe.enabled }}
          startupProbe:
            exec:
              command:
                - /hoocloak
                - health
                - --url
                - http://127.0.0.1:8080/ready
            initialDelaySeconds: {{ .Values.startupProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.startupProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.startupProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.startupProbe.failureThreshold }}
          {{- end }}
          {{- if .Values.livenessProbe.enabled }}
          livenessProbe:
            exec:
              command:
                - /hoocloak
                - health
                - --url
                - http://127.0.0.1:8080/ready
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.livenessProbe.failureThreshold }}
          {{- end }}
          {{- if .Values.readinessProbe.enabled }}
          readinessProbe:
            exec:
              command:
                - /hoocloak
                - health
                - --url
                - http://127.0.0.1:8080/ready
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.readinessProbe.failureThreshold }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/hoocloak/config.yaml
              subPath: config.yaml
              readOnly: true
            {{- if .Values.theme.image.reference }}
            - name: theme
              mountPath: {{ .Values.theme.mountPath }}
              readOnly: true
            {{- end }}
      volumes:
        - name: config
          secret:
            secretName: {{ include "hoocloak.configSecretName" . }}
            items:
              - key: {{ ternary .Values.existingConfigSecretKey "config.yaml" (ne .Values.existingConfigSecret "") | quote }}
                path: config.yaml
        {{- if .Values.theme.image.reference }}
        - name: theme
          emptyDir:
            sizeLimit: {{ .Values.theme.emptyDir.sizeLimit }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
