apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "hoocloak.fullname" . }}-test-connection"
  labels:
    {{- include "hoocloak.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  automountServiceAccountToken: false
  {{- with .Values.imagePullSecrets }}
  imagePullSecrets:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  securityContext:
    runAsNonRoot: true
    runAsUser: 65532
    runAsGroup: 65532
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: health
      image: {{ include "hoocloak.image" . | quote }}
      imagePullPolicy: {{ .Values.image.pullPolicy }}
      args:
        - health
        - --url
        - http://{{ include "hoocloak.fullname" . }}:{{ .Values.service.port }}/ready
        - --timeout
        - 5s
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        readOnlyRootFilesystem: true
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
