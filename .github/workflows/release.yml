name: Release

on:
  workflow_run:
    workflows:
      - CI
    branches:
      - main
    types:
      - completed
  workflow_dispatch:
    inputs:
      dry_run:
        description: Preview Hooversion without release commits, tags, releases, or images
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: release-main
  cancel-in-progress: false

env:
  BUN_VERSION: 1.3.14
  HOOVERSION_SHA: 799ecf4a9c29e8ce4d5ad7055a6030adf665cf82 # v0.2.0
  GHCR_IMAGE: ghcr.io/${{ github.repository }}
  DOCKERHUB_IMAGE: openhoo/hoocloak

jobs:
  release:
    name: Hooversion Release
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main' &&
        github.event.workflow_run.head_repository.full_name == github.repository &&
        !startsWith(github.event.workflow_run.head_commit.message, 'chore(release):')
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    outputs:
      commit: ${{ steps.metadata.outputs.commit }}
      current: ${{ steps.current.outputs.current || steps.manual_current.outputs.current }}
      published: ${{ steps.metadata.outputs.published }}
      short_sha: ${{ steps.metadata.outputs.short_sha }}
      tag: ${{ steps.metadata.outputs.tag }}
      version: ${{ steps.metadata.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          ref: main

      - name: Verify release run matches current main
        id: current
        if: github.event_name == 'workflow_run'
        env:
          EXPECTED_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          actual="$(git rev-parse HEAD)"
          if [ "$actual" = "$EXPECTED_SHA" ]; then
            echo "current=true" >> "$GITHUB_OUTPUT"
          else
            echo "current=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping stale release run for $EXPECTED_SHA because main is $actual."
          fi

      - name: Verify manual release CI prerequisite
        id: manual_prerequisite
        if: github.event_name == 'workflow_dispatch' && !inputs.dry_run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          checked_out_sha="$(git rev-parse HEAD)"
          current_main_sha="$(
            gh api \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "/repos/${GITHUB_REPOSITORY}/git/ref/heads/main" \
              --jq '.object.sha'
          )"
          if [ "$checked_out_sha" != "$current_main_sha" ]; then
            echo "::error::Manual publication checkout $checked_out_sha is stale; current main is $current_main_sha. Rerun the release workflow."
            exit 1
          fi

          version="$(tr -d '\r\n' < internal/version/version)"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::internal/version/version contains invalid release version '$version'."
            exit 1
          fi
          tag="v${version}"
          subject="$(git log -1 --format=%s HEAD)"
          expected_subject="chore(release): hoocloak ${version}"
          ci_sha="$current_main_sha"
          resume=false

          if [ "$subject" = "$expected_subject" ]; then
            if ! git fetch --force origin "refs/tags/${tag}:refs/tags/${tag}"; then
              echo "::error::Existing release retry requires tag $tag, but it is missing from origin."
              exit 1
            fi
            tag_commit="$(git rev-parse "${tag}^{commit}")"
            if [ "$tag_commit" != "$checked_out_sha" ]; then
              echo "::error::Existing release retry requires tag $tag to point to current HEAD $checked_out_sha, but it points to $tag_commit."
              exit 1
            fi
            ci_sha="$(git rev-parse HEAD^)"
            resume=true
            echo "Recognized existing release $tag at $checked_out_sha; validating CI for first parent $ci_sha."
          fi

          successful_runs="$(
            gh api --method GET \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "/repos/${GITHUB_REPOSITORY}/actions/workflows/ci.yml/runs" \
              -f branch=main \
              -f event=push \
              -f head_sha="$ci_sha" \
              -f status=success \
              -f per_page=1 \
              --jq '.total_count'
          )"
          if [ "$successful_runs" -eq 0 ]; then
            if [ "$resume" = "true" ]; then
              echo "::error::Existing release retry requires a successful push CI workflow run for first parent SHA $ci_sha."
            else
              echo "::error::Manual publication requires a successful push CI workflow run for current main SHA $ci_sha. Run CI for this exact commit, or use dry_run for a preview."
            fi
            exit 1
          fi
          {
            echo "resume=$resume"
            echo "tag=$tag"
            echo "version=$version"
          } >> "$GITHUB_OUTPUT"
          echo "Found a successful push CI workflow run for SHA $ci_sha."

      - name: Mark manual release current
        id: manual_current
        if: github.event_name == 'workflow_dispatch'
        run: echo "current=true" >> "$GITHUB_OUTPUT"

      - name: Set up Bun
        if: (steps.current.outputs.current == 'true' || steps.manual_current.outputs.current == 'true') && steps.manual_prerequisite.outputs.resume != 'true'
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install Hooversion
        if: (steps.current.outputs.current == 'true' || steps.manual_current.outputs.current == 'true') && steps.manual_prerequisite.outputs.resume != 'true'
        run: |
          set -euo pipefail
          install_dir="$(mktemp -d "$RUNNER_TEMP/hooversion.XXXXXXXX")"
          echo "HOOVERSION_DIR=$install_dir" >> "$GITHUB_ENV"
          git init "$install_dir"
          git -C "$install_dir" fetch --depth 1 https://github.com/openhoo/hooversion.git "$HOOVERSION_SHA"
          git -C "$install_dir" checkout --detach FETCH_HEAD
          test "$(git -C "$install_dir" rev-parse HEAD)" = "$HOOVERSION_SHA"
          cd "$install_dir"
          bun install --frozen-lockfile

      - name: Configure release git author
        if: (steps.current.outputs.current == 'true' || steps.manual_current.outputs.current == 'true') && steps.manual_prerequisite.outputs.resume != 'true'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Release
        id: release
        if: (steps.current.outputs.current == 'true' || steps.manual_current.outputs.current == 'true') && steps.manual_prerequisite.outputs.resume != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}
        run: |
          set -euo pipefail
          args=(release --no-github)
          if [ "$DRY_RUN" = "true" ]; then
            args+=(--dry-run)
          fi
          bun "$HOOVERSION_DIR/src/cli.ts" "${args[@]}"

      - name: Resolve publication metadata
        id: metadata
        if: steps.current.outputs.current == 'true' || steps.manual_current.outputs.current == 'true'
        env:
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}
          HOOVERSION_PUBLISHED: ${{ steps.release.outputs.published }}
          HOOVERSION_TAG: ${{ steps.release.outputs.tag }}
          HOOVERSION_VERSION: ${{ steps.release.outputs.version }}
          MANUAL_RESUME: ${{ steps.manual_prerequisite.outputs.resume }}
          MANUAL_RESUME_TAG: ${{ steps.manual_prerequisite.outputs.tag }}
          MANUAL_RESUME_VERSION: ${{ steps.manual_prerequisite.outputs.version }}
        run: |
          set -euo pipefail

          if [ "$DRY_RUN" = "true" ]; then
            {
              echo "published=false"
              echo "tag=$HOOVERSION_TAG"
              echo "version=$HOOVERSION_VERSION"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          version="$(tr -d '\r\n' < internal/version/version)"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::internal/version/version contains invalid release version '$version'."
            exit 1
          fi
          tag="v${version}"
          commit="$(git rev-parse HEAD)"
          subject="$(git log -1 --format=%s HEAD)"
          expected_subject="chore(release): hoocloak ${version}"

          if [ "$HOOVERSION_PUBLISHED" = "true" ]; then
            if [ "$HOOVERSION_VERSION" != "$version" ] || [ "$HOOVERSION_TAG" != "$tag" ]; then
              echo "::error::Hooversion published ${HOOVERSION_TAG:-<no tag>} (${HOOVERSION_VERSION:-<no version>}), but repository metadata resolves to $tag ($version)."
              exit 1
            fi
          elif [ "$MANUAL_RESUME" = "true" ]; then
            if [ "$MANUAL_RESUME_VERSION" != "$version" ] || [ "$MANUAL_RESUME_TAG" != "$tag" ] || [ "$subject" != "$expected_subject" ]; then
              echo "::error::Manual release retry metadata no longer matches current release $tag at $commit."
              exit 1
            fi
            echo "Resuming publication for existing release $tag at $commit."
          else
            {
              echo "published=false"
              echo "tag=$HOOVERSION_TAG"
              echo "version=$HOOVERSION_VERSION"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if ! git fetch --force origin "refs/tags/${tag}:refs/tags/${tag}"; then
            echo "::error::Release tag $tag is missing from origin."
            exit 1
          fi
          tag_commit="$(git rev-parse "${tag}^{commit}")"
          if [ "$tag_commit" != "$commit" ]; then
            echo "::error::Release tag $tag points to $tag_commit, not current HEAD $commit."
            exit 1
          fi

          {
            echo "commit=$commit"
            echo "published=true"
            echo "short_sha=${commit:0:7}"
            echo "tag=$tag"
            echo "version=$version"
          } >> "$GITHUB_OUTPUT"

      - name: Remove Hooversion checkout
        if: always()
        run: test -z "${HOOVERSION_DIR:-}" || rm -rf "$HOOVERSION_DIR"

  publish-chart:
    name: Publish Helm chart
    needs: release
    if: needs.release.outputs.current == 'true' && needs.release.outputs.published == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout release tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ needs.release.outputs.tag }}

      - name: Set up Helm
        uses: azure/setup-helm@59b1c81c6280f5abebb1fb1bc585696daa7dfb42 # v5
        with:
          version: v4.2.2

      - name: Package chart
        run: helm package charts/hoocloak --destination dist

      - name: Upload packaged chart
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: chart-${{ needs.release.outputs.tag }}
          path: dist/*.tgz
          if-no-files-found: error
          retention-days: 1

  publish-image:
    name: Publish images
    needs: release
    if: needs.release.outputs.current == 'true' && needs.release.outputs.published == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      artifact-metadata: write
      attestations: write
      contents: read
      id-token: write
      packages: write
    steps:
      - name: Checkout release tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          ref: ${{ needs.release.outputs.tag }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Derive image tags and labels
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: |
            ${{ env.GHCR_IMAGE }}
            ${{ env.DOCKERHUB_IMAGE }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.release.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.release.outputs.version }}
            type=raw,value=sha-${{ needs.release.outputs.short_sha }}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.revision=${{ needs.release.outputs.commit }}
            org.opencontainers.image.version=${{ needs.release.outputs.version }}

      - name: Build and push image
        id: push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          build-args: VERSION=${{ needs.release.outputs.version }}
          cache-from: type=gha,scope=hoocloak-image
          cache-to: type=gha,mode=max,scope=hoocloak-image
          context: .
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,compression=zstd,compression-level=19,force-compression=true
          platforms: linux/amd64,linux/arm64
          provenance: mode=max
          sbom: true
          push: true
          tags: ${{ steps.meta.outputs.tags }}

      - name: Verify compressed platform images
        env:
          GHCR_IMAGE: ${{ env.GHCR_IMAGE }}
          DOCKERHUB_IMAGE: ${{ env.DOCKERHUB_IMAGE }}
          INDEX_DIGEST: ${{ steps.push.outputs.digest }}
          MAX_COMPRESSED_SIZE: "5242880"
        run: |
          mapfile -t platforms < <(
            docker buildx imagetools inspect --raw "${GHCR_IMAGE}@${INDEX_DIGEST}" |
              jq -r '.manifests[] | select(.platform.os == "linux") | "\(.platform.os)/\(.platform.architecture)"' |
              sort
          )
          expected=(linux/amd64 linux/arm64)
          test "${platforms[*]}" = "${expected[*]}"

          mapfile -t manifests < <(
            docker buildx imagetools inspect --raw "${GHCR_IMAGE}@${INDEX_DIGEST}" |
              jq -r '.manifests[] | select(.platform.os == "linux") | .digest'
          )
          test "${#manifests[@]}" -eq 2
          test "${manifests[0]}" != "${manifests[1]}"
          for manifest in "${manifests[@]}"; do
            details="$(docker buildx imagetools inspect --raw "${GHCR_IMAGE}@${manifest}")"
            jq -e 'all(.layers[]; .mediaType == "application/vnd.oci.image.layer.v1.tar+zstd")' <<<"${details}"
            size="$(jq '[.layers[].size] | add' <<<"${details}")"
            test "${size}" -le "${MAX_COMPRESSED_SIZE}"
          done
          docker buildx imagetools inspect "${DOCKERHUB_IMAGE}@${INDEX_DIGEST}" > /dev/null

      - name: Generate artifact attestation
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4
        with:
          subject-name: ${{ env.GHCR_IMAGE }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  publish-release:
    name: Publish GitHub Release
    needs:
      - release
      - publish-chart
      - publish-image
    if: needs.release.outputs.current == 'true' && needs.release.outputs.published == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download packaged chart
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: chart-${{ needs.release.outputs.tag }}
          path: dist

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.release.outputs.tag }}
          RELEASE_VERSION: ${{ needs.release.outputs.version }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          charts=(dist/*.tgz)
          test "${#charts[@]}" -eq 1
          chart="${charts[0]}"
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "$chart" --clobber --repo "$GITHUB_REPOSITORY"
            gh release edit "$RELEASE_TAG" --draft=false --repo "$GITHUB_REPOSITORY"
          else
            gh release create "$RELEASE_TAG" "$chart" \
              --repo "$GITHUB_REPOSITORY" \
              --verify-tag \
              --title "Hoocloak ${RELEASE_VERSION}" \
              --generate-notes
          fi
