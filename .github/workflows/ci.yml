name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  BUN_VERSION: 1.3.14
  HOOVERSION_SHA: 799ecf4a9c29e8ce4d5ad7055a6030adf665cf82 # v0.2.0

jobs:
  commitlint:
    name: Conventional Commits
    if: github.event_name != 'push' || !startsWith(github.event.head_commit.message, 'chore(release):')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install Hooversion
        run: |
          set -euo pipefail
          install_dir="$(mktemp -d "$RUNNER_TEMP/hooversion.XXXXXXXX")"
          echo "HOOVERSION_DIR=$install_dir" >> "$GITHUB_ENV"
          git init "$install_dir"
          git -C "$install_dir" fetch --depth 1 https://github.com/openhoo/hooversion.git "$HOOVERSION_SHA"
          git -C "$install_dir" checkout --detach FETCH_HEAD
          test "$(git -C "$install_dir" rev-parse HEAD)" = "$HOOVERSION_SHA"
          cd "$install_dir"
          bun install --frozen-lockfile

      - name: Lint commits
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            bun "$HOOVERSION_DIR/src/cli.ts" lint \
              --from "${{ github.event.pull_request.base.sha }}" \
              --to "${{ github.event.pull_request.head.sha }}"
          else
            bun "$HOOVERSION_DIR/src/cli.ts" lint --last
          fi

      - name: Remove Hooversion checkout
        if: always()
        run: test -z "${HOOVERSION_DIR:-}" || rm -rf "$HOOVERSION_DIR"

  test:
    name: Go tests
    needs: commitlint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: 1.26.5
          cache: true
          cache-dependency-path: go.sum

      - name: Test
        run: go test -race -tags no_otel ./...

      - name: Run benchmarks
        run: go test -tags no_otel -run '^$' -bench . -benchmem -benchtime=100ms -count=1 ./internal/config ./internal/idp

      - name: Check formatting
        run: test -z "$(gofmt -l cmd internal)"

      - name: Vet
        run: go vet -tags no_otel ./...

      - name: Verify modules
        run: go mod verify

      - name: Scan reachable Go vulnerabilities
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.6.0 -tags no_otel ./...

      - name: Scan Go security patterns
        run: go run github.com/securego/gosec/v2/cmd/gosec@v2.28.0 -quiet -tags no_otel ./...

  helm:
    name: Helm chart
    needs: commitlint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Helm
        uses: azure/setup-helm@59b1c81c6280f5abebb1fb1bc585696daa7dfb42 # v5
        with:
          version: v4.2.2

      - name: Validate chart
        run: |
          set -euo pipefail
          helm lint charts/hoocloak --strict
          helm template hoocloak charts/hoocloak --namespace hoocloak > /dev/null
          helm template hoocloak charts/hoocloak --namespace hoocloak \
            --set existingConfigSecret=hoocloak-config \
            --set existingConfigSecretKey=provider.yaml \
            --set-string existingConfigSecretVersion=1 > /dev/null
          helm template hoocloak charts/hoocloak --namespace hoocloak \
            --set image.digest=sha256:aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa > /dev/null
          helm package charts/hoocloak --destination "$RUNNER_TEMP"

  docker:
    name: Container images
    needs:
      - commitlint
      - test
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      COMPOSE_PROJECT_NAME: hoocloak-ci-${{ github.run_id }}
      MAX_COMPRESSED_SIZE: "5242880"
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Validate Compose
        run: |
          docker compose config --quiet
          HOOCLOAK_THEME_DIR="$RUNNER_TEMP/hoocloak-theme" \
            docker compose -f compose.yaml -f compose.theme.yaml config --quiet

      - name: Build release-shaped image
        run: |
          docker buildx build \
            --build-arg "VERSION=ci-${GITHUB_SHA::12}" \
            --cache-from type=gha,scope=hoocloak-image \
            --cache-to type=gha,mode=max,scope=hoocloak-image \
            --output "type=oci,dest=$RUNNER_TEMP/hoocloak.oci.tar,compression=zstd,compression-level=19,force-compression=true" \
            --platform linux/amd64,linux/arm64 \
            --provenance=false \
            --sbom=false \
            .

      - name: Enforce platform and size budgets
        run: |
          root_index="$(tar -xOf "$RUNNER_TEMP/hoocloak.oci.tar" index.json)"
          image_index_digest="$(jq -r '.manifests[0].digest' <<<"$root_index")"
          image_index="$(tar -xOf "$RUNNER_TEMP/hoocloak.oci.tar" "blobs/sha256/${image_index_digest#sha256:}")"
          mapfile -t platforms < <(
            jq -r '.manifests[] | "\(.platform.os)/\(.platform.architecture)"' <<<"$image_index" |
              sort
          )
          expected=(linux/amd64 linux/arm64)
          test "${platforms[*]}" = "${expected[*]}"
          while read -r platform digest; do
            manifest="$(tar -xOf "$RUNNER_TEMP/hoocloak.oci.tar" "blobs/sha256/${digest#sha256:}")"
            jq -e 'all(.layers[]; .mediaType == "application/vnd.oci.image.layer.v1.tar+zstd")' <<<"$manifest"
            size="$(jq '[.layers[].size] | add' <<<"$manifest")"
            echo "$platform: $size compressed bytes"
            test "$size" -le "$MAX_COMPRESSED_SIZE"
          done < <(
            jq -r '.manifests[] | "\(.platform.os)/\(.platform.architecture) \(.digest)"' <<<"$image_index"
          )

      - name: Build example images
        run: |
          docker buildx build \
            --cache-from type=gha,scope=hoocloak-api \
            --cache-to type=gha,mode=max,scope=hoocloak-api \
            --load \
            --tag hoocloak-api:dev \
            examples/aspnet-api
          docker buildx build \
            --cache-from type=gha,scope=hoocloak-spa \
            --cache-to type=gha,mode=max,scope=hoocloak-spa \
            --load \
            --tag hoocloak-spa:dev \
            examples/react-spa

      - name: Install E2E dependencies
        run: |
          npm ci --no-audit --no-fund
          npx playwright install --with-deps chromium firefox webkit

      - name: Test complete example stack
        run: npm run e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 7

      - name: Remove CI containers
        if: always()
        run: docker compose down --volumes --remove-orphans
